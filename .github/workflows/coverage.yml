name: coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate code coverage
        run: |
           cargo tarpaulin --package dogleg --force-clean --verbose --engine llvm --timeout 300 --out Lcov --exclude-files "levmar-problems/**" --exclude-files "templated-tests/**" --exclude-files "ceres-dogleg/**" --exclude-files "argmin-dogleg/**"
          
      - name: upload to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: "./lcov.info"
