name: lints

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, dev]
  schedule:
  # Runs the workflow at 00:00 on the first day of every month
  - cron: '0 0 1 * *'

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy -p dogleg -p dogleg-matx --features faer,nalgebra,levenberg-marquardt
